    <main>
        <section class="main-oficial">
         <h1>Editar Perfil</h1>
        <form id="formEditar">
            <div class="foto-editar">
                <img id="previewFoto" src="usuario.png" width="150" height="150" alt="Foto de perfil">
                <br>
                <label for="foto">Alterar foto:</label>
                <input type="file" id="foto" accept="image/*" onchange="mostrarFoto()"><br><br>
            </div>
            <br>
            <label>Nome:</label>
                <input type="text" id="nome" placeholder="Nome completo"><br>
            <label>Email:</label>
                <input type="email" id="email" placeholder="Email"><br>
            <label>Endereço:</label>
                <input type="text" id="endereco" placeholder="Rua, Número, Baiiro, Cidade, Estado, CEP"><br>
            <label>Senha:</label>
                <input type="password" id="senha" placeholder="Senha"><br>
            <button type="submit">Salvar alterações</button>
        </form>
    </main>
    <footer>
        <p>© Todos os Direitos Reservados - Social Tennis - 2025</p>
    </footer>
